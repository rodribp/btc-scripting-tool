<div class="ml-[20%] mr-[22%] h-screen flex flex-col">
  <div class="flex items-center gap-3 px-6 py-4 border-b border-white/10">
    <span class="text-sm text-gray-500 flex-1 select-none">
      {{ scriptBuilder.blocks().length }} block(s)
    </span>
    <button (click)="clear()"
      class="px-3 py-1.5 text-xs rounded bg-white/10 hover:bg-white/20 text-gray-300 transition-colors">
      Clear
    </button>
    <button (click)="reset()"
      class="px-3 py-1.5 text-xs rounded bg-white/10 hover:bg-white/20 text-gray-300 transition-colors">
      Reset stack
    </button>
    <button (click)="stepBack()" [disabled]="!vmState.canStepBack()"
      class="px-3 py-1.5 text-xs rounded bg-white/10 hover:bg-white/20 text-gray-300 transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
      ← Back
    </button>
    <button (click)="step()" [disabled]="!!vmState.vmState()?.isComplete || !!vmState.vmState()?.error"
      class="px-3 py-1.5 text-xs rounded bg-white/10 hover:bg-white/20 text-gray-300 transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
      Step →
    </button>
    <button (click)="run()"
      class="px-3 py-1.5 text-xs rounded bg-green-700 hover:bg-green-600 text-white font-medium transition-colors">
      Run
    </button>
  </div>

  <div cdkDropList [cdkDropListData]="scriptBuilder.blocks()" (cdkDropListDropped)="onDrop($event)"
    class="flex-1 overflow-y-auto flex flex-col items-center py-8 gap-2">

    @if (scriptBuilder.blocks().length === 0) {
    <p class="text-gray-600 text-sm mt-20 select-none">Drag opcodes from the sidebar to build your script</p>
    }

    @for (block of scriptBuilder.blocks(); track block.id; let i = $index) {
    <div cdkDrag [cdkDragData]="block" class="block-wrapper border-1 border-gray-200 rounded-md"
      [class.current-block]="isCurrentBlock(i)">
      <app-block-card [block]="block" />
    </div>
    }
  </div>
</div>
