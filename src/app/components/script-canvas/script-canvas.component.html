<div class="lg:ml-[20%] lg:mr-[22%] h-screen flex flex-col">
  <div class="flex flex-wrap items-center gap-1.5 lg:gap-3 pl-16 pr-4 lg:px-6 py-3 lg:py-4 border-b border-white/10">
    <span class="text-sm text-gray-500 flex-1 select-none">
      {{ scriptBuilder.blocks().length }} block(s)
    </span>
    <button (click)="clear()"
      class="px-2.5 py-1.5 text-xs rounded bg-white/10 hover:bg-white/20 text-gray-300 transition-colors">
      Clear
    </button>
    <button (click)="reset()"
      class="px-2.5 py-1.5 text-xs rounded bg-white/10 hover:bg-white/20 text-gray-300 transition-colors">
      <span class="lg:hidden">Reset</span>
      <span class="hidden lg:inline">Reset stack</span>
    </button>
    <button (click)="stepBack()" [disabled]="!vmState.canStepBack()"
      class="px-2.5 py-1.5 text-xs rounded bg-white/10 hover:bg-white/20 text-gray-300 transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
      ← Back
    </button>
    <button (click)="step()" [disabled]="!!vmState.vmState()?.isComplete || !!vmState.vmState()?.error"
      class="px-2.5 py-1.5 text-xs rounded bg-white/10 hover:bg-white/20 text-gray-300 transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
      Step →
    </button>
    <button (click)="run()"
      class="px-2.5 py-1.5 text-xs rounded bg-green-700 hover:bg-green-600 text-white font-medium transition-colors">
      Run
    </button>
  </div>

  <div cdkDropList [cdkDropListData]="scriptBuilder.blocks()" (cdkDropListDropped)="onDrop($event)"
    class="flex-1 overflow-y-auto flex flex-col items-center py-8 gap-2 pb-16 lg:pb-8">

    @if (scriptBuilder.blocks().length === 0) {
    <p class="text-gray-600 text-sm mt-20 select-none text-center px-4">
      <span class="lg:hidden">Open the sidebar and tap + on an opcode to build your script</span>
      <span class="hidden lg:inline">Drag opcodes from the sidebar to build your script</span>
    </p>
    }

    @for (block of scriptBuilder.blocks(); track block.id; let i = $index) {
    <div cdkDrag [cdkDragData]="block" class="block-wrapper border-1 border-gray-200 rounded-md"
      [class.current-block]="isCurrentBlock(i)">
      <app-block-card [block]="block" />
    </div>
    }
  </div>
</div>
