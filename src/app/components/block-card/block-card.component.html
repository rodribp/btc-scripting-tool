<div class="block-card rounded-md overflow-hidden">
  <div cdkDragHandle class="flex items-center justify-between pl-3 py-2 cursor-grab active:cursor-grabbing" [ngClass]="block().color">
    <span class="font-medium text-sm text-white select-none">{{ block().opcode.name }}</span>
    <div class="flex">
      <button (click)="clone()" class="text-white/60 hover:text-white p-2 leading-none transition-colors">
        <fa-icon [icon]="faCopy" size="sm" />
      </button>
      <button (click)="remove()" class="text-white/60 hover:text-white p-2 leading-none transition-colors">
        <fa-icon [icon]="faXmark" size="sm" />
      </button>
    </div>
  </div>

  @if (block().opcode.userEntries?.length) {
  <div class="bg-white/5 px-3 py-2 flex flex-col gap-2">
    @for (entry of block().opcode.userEntries!; track entry.key) {
    <label class="flex flex-col gap-1">
      <span class="text-xs text-gray-400">{{ entry.label }}</span>
      @if (entry.type === 'number' || entry.type === 'bigint') {
      <input type="number"
        [attr.min]="entry.min ?? null" [attr.max]="entry.max ?? null"
        [value]="block().userValues[entry.key]"
        (keyup)="updateValue(entry.key, $any($event.target).value)"
        class="bg-black/40 text-white text-xs px-2 py-1 rounded outline-none [appearance:textfield] w-full">
      } @else {
      <input type="text"
        [value]="block().userValues[entry.key]"
        (keyup)="updateValue(entry.key, $any($event.target).value)"
        class="bg-black/40 text-white text-xs px-2 py-1 rounded outline-none font-mono w-full">
      }
    </label>
    }
  </div>
  }
</div>
